services:
  - type: web
    name: dreamx-store
    runtime: node
    # Root directory is now the project root to manage sub-service builds
    rootDir: .
    buildCommand: npm run install-all && npm run build --prefix Dreamxstore
    # Start both services via root package.json for better orchestration
    startCommand: npm start
    envVars:
      # Database and Core
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      
      # Unified URLs (self-referencing)
      - key: FRONTEND_URL
        value: https://dreamx-store.onrender.com
      - key: BACKEND_URL
        value: https://dreamx-store.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://dreamx-store.onrender.com/api
      - key: NEXT_PUBLIC_AUTH_URL
        value: https://dreamx-store.onrender.com
      
      # Auth Secrets
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      
      # Payments
      - key: RAZOPAY_KEY
        sync: false
      - key: RAZOPAY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      
      # Communication
      - key: MAILSERVER_URL
        sync: false
