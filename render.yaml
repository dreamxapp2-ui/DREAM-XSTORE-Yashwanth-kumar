services:
  # Backend API Service
  - type: web
    name: dream-xstore
    runtime: node
    rootDir: API-Backend
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: MONGODB_URI
        sync: false # REQUIRED: You must add your MongoDB Atlas connection string in the Render Dashboard!
      - key: FRONTEND_URL
        fromService:
          name: dreamx-store
          type: web
          property: url
      - key: NODE_ENV
        value: production

  # Frontend Next.js Service
  - type: web
    name: dreamx-store
    runtime: node
    rootDir: Dreamxstore
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: dream-xstore
          type: web
          property: url
        # IMPORTANT: Next.js needs the full URL including /api
        # If your backend is at https://xxx.onrender.com, set this to https://xxx.onrender.com/api
        # Render's auto-wiring (fromService) might not append /api automatically.
      - key: NEXT_PUBLIC_AUTH_URL
        fromService:
          name: dream-xstore
          type: web
          property: url
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false # User must provide this
      - key: NODE_ENV
        value: production
