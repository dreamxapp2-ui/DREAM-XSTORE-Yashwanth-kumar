services:
  # ── Production (main branch) ──
  - type: web
    name: dreamx-store
    runtime: node
    branch: main
    rootDir: .
    buildCommand: npm run install-all && npm run build --prefix Dreamxstore
    startCommand: npm start
    envVars:
      # Server Ports
      - key: BACKEND_PORT
        value: "5000"
      
      # Database and Core
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      
      # Unified URLs (self-referencing)
      - key: FRONTEND_URL
        value: https://dream-xstore-yashwanth-kumar.onrender.com
      - key: BACKEND_URL
        value: https://dream-xstore-yashwanth-kumar.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://dream-xstore-yashwanth-kumar.onrender.com/api
      - key: NEXT_PUBLIC_AUTH_URL
        value: https://dream-xstore-yashwanth-kumar.onrender.com
      
      # Auth Secrets
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      
      # Payments
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      
      # Communication
      - key: MAILSERVER_URL
        sync: false

  # ── Dev (dev branch) ──
  - type: web
    name: dreamx-store-dev
    runtime: node
    branch: dev
    rootDir: .
    buildCommand: npm run install-all && npm run build --prefix Dreamxstore
    startCommand: npm start
    envVars:
      # Server Ports
      - key: BACKEND_PORT
        value: "5000"
      
      # Database and Core
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: development
      
      # Unified URLs (dev instance)
      - key: FRONTEND_URL
        value: https://dreamx-store-dev.onrender.com
      - key: BACKEND_URL
        value: https://dreamx-store-dev.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://dreamx-store-dev.onrender.com/api
      - key: NEXT_PUBLIC_AUTH_URL
        value: https://dreamx-store-dev.onrender.com
      
      # Auth Secrets
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      
      # Payments
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      
      # Communication
      - key: MAILSERVER_URL
        sync: false
